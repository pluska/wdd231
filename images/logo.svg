<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Color Palette Gradients -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#285A48" />
      <stop offset="100%" stop-color="#408A71" />
    </linearGradient>
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#B0E4CC" />
    </linearGradient>
    <!-- Drop Shadow for Premium Feel -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#091413" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Card (Squircle) -->
  <rect x="4" y="4" width="92" height="92" rx="22" fill="url(#bg-gradient)" filter="url(#shadow)" />

  <!-- Premium Ring Accents -->
  <rect x="10" y="10" width="80" height="80" rx="16" fill="none" stroke="#B0E4CC" stroke-width="3" stroke-linecap="round" />
  <rect x="14" y="14" width="72" height="72" rx="12" fill="none" stroke="#408A71" stroke-width="1" opacity="0.5" />

  <!-- Initials AP (Custom Vector Paths for Perfect Rendering without Font Dependencies) -->
  <g stroke="url(#text-gradient)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Letter A -->
    <path d="M 23,66 L 36.5,34 L 50,66" />
    <path d="M 29.5,50 H 43.5" stroke-width="6.5" />
    
    <!-- Letter P -->
    <path d="M 58,34 V 66" />
    <path d="M 58,34 H 68 C 76,34 76,50 68,50 H 58" />
  </g>
</svg>
